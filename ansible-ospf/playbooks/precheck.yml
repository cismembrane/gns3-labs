- name: Precheck connectivity to Cisco IOS routers
  hosts: ios
  gather_facts: false

  tasks:
    - name: Run basic show commands
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
          - show version | include IOS
      register: precheck

    - name: Print precheck summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "{{ precheck.stdout[0] }}"
          - "{{ precheck.stdout[1] }}"