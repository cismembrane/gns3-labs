name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly link check. The links job gates on schedule; push and PR skip it.
    - cron: '0 6 * * 1'

jobs:

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install yamllint
        # Pin matches .pre-commit-config.yaml rev: v1.35.1
        run: pip install "yamllint==1.35.1"

      - name: Run yamllint
        run: yamllint -c .yamllint.yml --strict .

  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ansible-lint and ansible-core
        # Pin matches .pre-commit-config.yaml rev: v24.7.0. cisco.ios requires >=2.15.
        run: pip install "ansible-lint==24.7.0" "ansible-core>=2.15,<2.17"

      - name: Install required collections
        # cisco.ios is used across ansible-bgp, ansible-ospf, and bgp-grafana-monitoring.
        # ansible-lint needs it present to resolve module FQCNs.
        run: ansible-galaxy collection install cisco.ios

      - name: Run ansible-lint
        # Reads .ansible-lint from the repo root automatically.
        # Vault-encrypted vars parse as tagged scalars -- no vault password needed for lint.
        run: ansible-lint

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install markdownlint-cli2
        # Pin matches .pre-commit-config.yaml rev: v0.13.0
        run: npm install -g "markdownlint-cli2@0.13.0"

      - name: Run markdownlint
        # Reads .markdownlint.yaml automatically.
        run: markdownlint-cli2 "**/*.md" "#node_modules"

  links:
    name: Check links
    runs-on: ubuntu-latest
    # Schedule only. YouTube rate-limits runners and the DevNet sandbox is auth-required;
    # both cause false failures on push and PR.
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # RFC1918 exclusions and YouTube 429 handling are in .lychee.toml.
          args: --config .lychee.toml "**/*.md"
          fail: true
