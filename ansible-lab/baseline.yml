- name: Baseline IOS config + validation
  hosts: ios
  gather_facts: false

  vars:
    domain_name: test.com
    ntp_server: 172.16.99.1

  tasks:
    - name: Pre-checks (snapshot key state)
      cisco.ios.ios_command:
        commands:
          - show version | i uptime|System image|Model number
          - show ip int brief
          - show run | i hostname|ip domain-name|username|ip ssh
      register: pre

    - name: Print pre-checks
      ansible.builtin.debug:
        var: pre.stdout_lines

    - name: Push baseline config
      cisco.ios.ios_config:
        lines:
          - hostname {{ inventory_hostname }}
          - ip domain-name {{ domain_name }}
          - service timestamps debug datetime msec
          - service timestamps log datetime msec
          - ip ssh version 2
          - ip ssh time-out 60
          - ip ssh authentication-retries 2
          - login block-for 60 attempts 3 within 60
          - no ip http server
          - no ip http secure-server
          - logging buffered 64000
          - ntp server {{ ntp_server }}
        save_when: modified

    - name: Post-checks (prove changes took)
      cisco.ios.ios_command:
        commands:
          - show run | i ^hostname|ip domain-name|ip ssh|ntp server|no ip http
      register: post

    - name: Print post-checks
      ansible.builtin.debug:
        var: post.stdout_lines
