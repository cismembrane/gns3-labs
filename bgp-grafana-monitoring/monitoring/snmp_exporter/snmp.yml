auths:
  cisco_v3:
    version: 3
    security_level: authPriv
    username: monitor
    password: admin123
    auth_protocol: SHA
    priv_password: admin123
    priv_protocol: AES
 
modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.1.3     # sysUpTime
      - 1.3.6.1.2.1.2.2     # ifTable
      - 1.3.6.1.2.1.31.1.1  # ifXTable (64-bit counters)
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
      - name: ifDescr
        oid: 1.3.6.1.2.1.2.2.1.2
        type: DisplayString
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
 
  bgp4:
    walk:
      - 1.3.6.1.2.1.15  # BGP4-MIB
    metrics:
      - name: bgpPeerState
        oid: 1.3.6.1.2.1.15.3.1.2
        type: gauge
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerAdminStatus
        oid: 1.3.6.1.2.1.15.3.1.3
        type: gauge
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerRemoteAs
        oid: 1.3.6.1.2.1.15.3.1.9
        type: gauge
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerInUpdates
        oid: 1.3.6.1.2.1.15.3.1.10
        type: counter
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerOutUpdates
        oid: 1.3.6.1.2.1.15.3.1.11
        type: counter
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
      - name: bgpPeerFsmEstablishedTime
        oid: 1.3.6.1.2.1.15.3.1.16
        type: gauge
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4
