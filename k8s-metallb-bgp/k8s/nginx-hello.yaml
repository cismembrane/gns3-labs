# Second LoadBalancer service pinned to 172.16.10.20. Exists to show MetalLB
# assigning and advertising multiple independent /32s from the same pool.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello
  labels:
    app: nginx-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-hello
  template:
    metadata:
      labels:
        app: nginx-hello
    spec:
      containers:
        - name: nginx-hello
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-hello
  annotations:
    metallb.io/loadBalancerIPs: 172.16.10.20
spec:
  type: LoadBalancer
  selector:
    app: nginx-hello
  ports:
    - name: http
      port: 80
      targetPort: 80
