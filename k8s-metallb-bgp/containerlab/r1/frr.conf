frr defaults traditional
hostname r1
!
interface lo
 ip address 1.1.1.1/32
!
interface eth1
 ip address 10.0.1.1/29
!
interface eth2
 ip address 10.0.4.1/29
!
interface eth3
 ip address 10.0.5.1/29
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 neighbor 10.0.1.2 remote-as 65002
 neighbor 10.0.1.2 description bgp_to_r2
 neighbor 10.0.4.4 remote-as 65004
 neighbor 10.0.4.4 description bgp_to_r4
 neighbor 10.0.5.5 remote-as 65100
 neighbor 10.0.5.5 description bgp_to_k3s_metallb
 address-family ipv4 unicast
  network 1.1.1.1/32
  network 10.0.1.0/29
  network 10.0.4.0/29
  network 10.0.5.0/29
 exit-address-family
!
line vty
